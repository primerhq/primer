# Dependabot configuration.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Python dependencies are managed with uv (lockfiles: ./uv.lock and
# ./runtime/uv.lock). primectl is a member of the root uv workspace
# ([tool.uv.workspace] in pyproject.toml), so its dependencies resolve into
# the root uv.lock; it gets its own entry to keep its pyproject.toml
# constraints fresh.
version: 2
updates:
  # Root project (also resolves the primectl workspace member into uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # In-container workspace runtime server (separate lockfile).
  - package-ecosystem: "uv"
    directory: "/runtime"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # primectl CLI manifest (workspace member of the root project).
  - package-ecosystem: "uv"
    directory: "/primectl"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"

  # Base images in the Dockerfiles.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "docker"
    directory: "/runtime"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
