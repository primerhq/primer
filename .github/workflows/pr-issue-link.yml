name: PR issue link

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  pull-requests: read

jobs:
  require-issue-link:
    name: Require a linked issue
    runs-on: ubuntu-latest

    steps:
      - name: Check the PR references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info("No pull_request payload; nothing to check.");
              return;
            }

            const labels = (pr.labels || []).map((l) => l.name);
            if (labels.includes("no-issue")) {
              core.info('The "no-issue" label is set; skipping the issue-link check.');
              return;
            }

            const body = pr.body || "";
            const hasIssueNumber = /#\d+/.test(body);
            const hasIssueUrl = /github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+/i.test(body);

            if (hasIssueNumber || hasIssueUrl) {
              core.info("This PR references an issue.");
              return;
            }

            core.setFailed(
              'This PR must reference an issue (e.g. "Closes #123"). ' +
                "See the issue-first workflow in CONTRIBUTING.md. " +
                'For a trivial fix, add the "no-issue" label.'
            );
