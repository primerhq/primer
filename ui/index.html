<!doctype html>
<!-- styles.css only defines design tokens under :root[data-theme="dark"]
     / :root[data-theme="light"], so an unset attribute leaves --bg /
     --text / --accent undefined and the page paints with browser
     defaults (white background, no card, no green button). Pin the
     initial theme to "dark" so the auth screen and any other pre-App
     render shows correctly; App.jsx still overrides this from the
     persisted tweaks once it mounts. -->
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Primer · Console</title>
<link rel="icon" type="image/svg+xml" href="brand/logo-light.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="brand/favicon-32.png" />
<link rel="icon" type="image/png" sizes="48x48" href="brand/favicon-48.png" />
<link rel="icon" type="image/png" sizes="64x64" href="brand/favicon-64.png" />
<link rel="icon" type="image/png" sizes="128x128" href="brand/favicon-128.png" />
<link rel="apple-touch-icon" href="brand/favicon-256.png" />
<link rel="preload" href="vendor/fonts/IBMPlexSans-VF-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="preload" href="vendor/fonts/IBMPlexMono-Regular-latin.woff2" as="font" type="font/woff2" crossorigin />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- Self-hosted React (production). Babel is no longer shipped to the
     browser: the backend (primer.api._jsx_bundle) pre-transpiles every
     foundation/components/*.jsx file at startup and serves the result
     as a single bundle at /console/_app.js. Audit trail for the React
     scripts in ui/vendor/MANIFEST.md. -->
<script src="vendor/react.min.js"></script>
<script src="vendor/react-dom.min.js"></script>
<!-- html2canvas: ships as a plain UMD bundle and registers
     window.html2canvas synchronously. Loaded before _app.js so the
     embed preview iframe sees it on first render. -->
<script src="vendor/html2canvas.min.js"></script>
<!-- SPIKE: AntV G6 v5 (UMD global window.G6). Plain script so it loads before
     _app.js — powers the optional G6 run-view canvas, toggled in the run view. -->
<script src="vendor/g6.min.js"></script>
<script src="_app.js"></script>

<!-- The text/babel script tags below are the single source of truth
     for bundle order. Browsers ignore them (unrecognized script
     type → no fetch, no execute), and primer.api._jsx_bundle.py
     reads this file at startup to discover which files to transpile
     and in what order. Edit / reorder / add files here, restart the
     server, and the next bundle build picks the change up. -->

<!-- Foundation layer (dependency order) -->
<script type="text/babel" src="foundation/api.js"></script>
<script type="text/babel" src="foundation/toast.js"></script>
<script type="text/babel" src="foundation/use-resource.js"></script>
<script type="text/babel" src="foundation/use-mutation.js"></script>
<script type="text/babel" src="foundation/router.js"></script>
<script type="text/babel" src="foundation/tweaks.js"></script>
<script type="text/babel" src="foundation/idle.js"></script>
<script type="text/babel" src="foundation/viewport.js"></script>

<!-- Vendor helpers -->
<script type="text/babel" src="vendor/highlight-python.js"></script>
<script type="text/babel" src="vendor/highlight-json.js"></script>
<script type="text/babel" src="vendor/sparkline.js"></script>
<script type="text/babel" src="vendor/auto-layout.js"></script>
<script type="text/babel" src="vendor/markdown.jsx"></script>

<!-- Shared components first (Icon/Btn/Modal etc.) + mock data + unused helper -->
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/session-state.jsx"></script>
<script type="text/babel" src="components/shared/token-meter.jsx"></script>
<script type="text/babel" src="components/shared/card-list.jsx"></script>
<script type="text/babel" src="components/shared/bottom-sheet.jsx"></script>
<script type="text/babel" src="components/shared/mobile-tabs.jsx"></script>
<script type="text/babel" src="components/shared/floating-action.jsx"></script>
<script type="text/babel" src="components/graph-canvas.jsx"></script>
<script type="text/babel" src="components/mock-data.jsx"></script>
<script type="text/babel" src="components/predicate-builder.jsx"></script>

<!-- Chrome + page components -->
<script type="text/babel" src="components/auth.jsx"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="components/dashboard.jsx"></script>
<script type="text/babel" src="components/workers.jsx"></script>
<script type="text/babel" src="components/health.jsx"></script>
<script type="text/babel" src="components/sessions-list.jsx"></script>
<script type="text/babel" src="components/session-frame.jsx"></script>
<script type="text/babel" src="components/session-detail.jsx"></script>
<script type="text/babel" src="components/workspaces/shared.jsx"></script>
<script type="text/babel" src="components/workspaces/providers.jsx"></script>
<script type="text/babel" src="components/workspaces/templates.jsx"></script>
<script type="text/babel" src="components/workspace-tap.jsx"></script>
<script type="text/babel" src="components/studio-sidebar.jsx"></script>
<script type="text/babel" src="components/studio.jsx"></script>
<script type="text/babel" src="components/workspaces.jsx"></script>
<script type="text/babel" src="components/agents.jsx"></script>
<script type="text/babel" src="components/graphs.jsx"></script>
<script type="text/babel" src="components/knowledge.jsx"></script>
<script type="text/babel" src="components/toolsets.jsx"></script>
<script type="text/babel" src="components/providers.jsx"></script>
<script type="text/babel" src="components/semantic-search.jsx"></script>
<script type="text/babel" src="components/web_search.jsx"></script>
<script type="text/babel" src="components/internal-collections.jsx"></script>
<script type="text/babel" src="components/approvals.jsx"></script>
<script type="text/babel" src="components/channels.jsx"></script>
<script type="text/babel" src="components/channel_rules.jsx"></script>
<script type="text/babel" src="components/chats.jsx"></script>
<script type="text/babel" src="components/harness_form.jsx"></script>
<script type="text/babel" src="components/harness_outbound_builder.jsx"></script>
<script type="text/babel" src="components/harnesses.jsx"></script>
<script type="text/babel" src="components/triggers.jsx"></script>
<script type="text/babel" src="components/api_tokens.jsx"></script>
<script type="text/babel" src="components/mcp.jsx"></script>

<!-- Tweaks panel + app -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
