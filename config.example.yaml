# config.example.yaml -- copy to config.yaml (gitignored) and adjust.
#
# Usage: uv run primer api --config config.yaml
#
# The CLI reads this file with yaml.safe_load and passes the resulting
# dict to AppConfig(**data), so every top-level key must match an
# AppConfig field. The old flat db_* keys (db_host, db_port, ...) are
# silently ignored by AppConfig (extra="ignore"); omitting them here
# prevents the silent-SQLite-fallback trap.
#
# Defaults below match the docker-compose.yml Postgres service, so the
# only thing most developers change is the password.

# --- Storage (Postgres) ----------------------------------------------------
# AppConfig.db is a StorageProviderConfig: {provider, config: {...}}.
# Omit this block to fall back to embedded SQLite at ~/.primer/db/data.sqlite
# (single-developer use only; not suitable for the Postgres scheduler).
db:
  provider: postgres
  config:
    hostname: localhost
    port: 5432
    database: primer
    username: primer
    password: primer
    pool:
      min_size: 1
      max_size: 25

# --- HTTP server -----------------------------------------------------------
host: 0.0.0.0
port: 8000

# --- Logging ---------------------------------------------------------------
log_level: info       # one of: debug, info, warning, error
log_json: true        # JSON lines (true) or human-readable (false)
# log_file: ./logs/primer.log   # uncomment to log to a rotating file

# --- Vector store (optional, required for collections + search) ------------
vector_store:
  provider: pgvector
  config:
    hostname: localhost
    port: 5432
    database: primer
    username: primer
    password: primer

# --- Scheduler (required when running a worker; CLI overrides runtime_mode)
scheduler:
  provider: postgres
  config: {}

# --- Worker pool knobs -----------------------------------------------------
worker:
  concurrency: 8
  claim_batch_size: 4
  heartbeat_interval_seconds: 10
  lease_ttl_seconds: 30
  poll_interval_seconds: 2.0
  drain_timeout_seconds: 120
  max_attempts: 5
  base_backoff_seconds: 2.0
  max_backoff_seconds: 300.0

# --- Subprocess timeout (git + init_command) --------------------------------
# Maximum seconds to wait for any git or init_command subprocess spawned by
# the local workspace backend. A hung git (index.lock / NFS stall) or runaway
# init_command is killed after this deadline and SubprocessTimeoutError is
# raised (releasing the commit lock). Override via PRIMER_SUBPROCESS_TIMEOUT_SECONDS.
# subprocess_timeout_seconds: 120.0

# --- MCP stdio safety (recommended for multi-tenant) ----------------------
# mcp_stdio_allowed_commands:
#   - python
#   - node
