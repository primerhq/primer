# Example config.yaml for `primer api --config config.yaml` and
# `primer worker --config config.yaml`. Copy this to `config.yaml`
# (which is gitignored by convention) and tweak.
#
# Defaults match the compose service in this repo (run with `podman
# compose up -d` or `docker compose up -d`), so the only
# thing you typically change is the password.

# --- Storage (Postgres) ----------------------------------------------------
db_host: localhost
db_port: 5432
db_database: primer
db_user: primer
db_password: primer
db_min_pool_size: 1
db_max_pool_size: 10

# --- HTTP server -----------------------------------------------------------
host: 0.0.0.0
port: 8000

# --- Logging ---------------------------------------------------------------
log_level: info       # one of: debug, info, warning, error
log_json: true        # JSON lines (true) or human-readable (false)
# log_file: ./logs/primer.log   # uncomment to log to a rotating file

# --- Vector store (optional, required for collections + search) ------------
vector_store:
  provider: pgvector
  config:
    hostname: localhost
    port: 5432
    database: primer
    username: primer
    password: primer

# --- Scheduler (required when running a worker; CLI overrides runtime_mode)
scheduler:
  provider: postgres
  config: {}

# --- Worker pool knobs -----------------------------------------------------
worker:
  concurrency: 8
  claim_batch_size: 4
  heartbeat_interval_seconds: 10
  lease_ttl_seconds: 30
  poll_interval_seconds: 2.0
  drain_timeout_seconds: 120
  max_attempts: 5
  base_backoff_seconds: 2.0
  max_backoff_seconds: 300.0

# --- Subprocess timeout (git + init_command) --------------------------------
# Maximum seconds to wait for any git or init_command subprocess spawned by
# the local workspace backend. A hung git (index.lock / NFS stall) or runaway
# init_command is killed after this deadline and SubprocessTimeoutError is
# raised (releasing the commit lock). Override via PRIMER_SUBPROCESS_TIMEOUT_SECONDS.
# subprocess_timeout_seconds: 120.0

# --- MCP stdio safety (recommended for multi-tenant) ----------------------
# mcp_stdio_allowed_commands:
#   - python
#   - node
