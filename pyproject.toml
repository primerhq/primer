[project]
name = "matrix"
version = "0.0.1"
description = "Microagents framework"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "aiodocker>=0.21",
    "aiosqlite>=0.20",
    "aiohttp>=3.11",
    "anthropic>=0.97.0",
    "asyncpg>=0.30.0",
    "croniter>=2.0.5",
    "ddgs>=9.0",
    "docling>=2.0",
    "fastapi>=0.115",
    "google-genai>=1.73.1",
    "grpcio>=1.60.0",
    "jinja2>=3.1.0",
    "jsonschema>=4.20",
    "kubernetes-asyncio>=32.0",
    "mcp>=1.16.0",
    "ollama>=0.6.1",
    "openai>=1.50.0",
    "pgvector>=0.3.6",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.6",
    "regopy>=0.4",
    "discord.py>=2.4",
    "python-telegram-bot>=21.0",
    "python-multipart>=0.0.12",
    "pyyaml>=6.0",
    "sentence-transformers>=3.0.0",
    "slack-bolt>=1.20",
    "slack-sdk>=3.27",
    "transformers>=5.6.2",
    "typer>=0.12",
    "tzdata>=2026.2",
    "uvicorn[standard]>=0.32",
]

[project.scripts]
matrix = "matrix.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["matrix"]

[dependency-groups]
dev = [
    "grpcio-tools>=1.60.0",
    "playwright>=1.49.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=7.1.0",
    "pytest-playwright>=0.6.2",
    "respx>=0.21.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
# tests/e2e/ is skipped unless MATRIX_RUN_E2E=1 is set in the environment
# (see tests/e2e/conftest.py). The harness sets the env var; default unit
# runs do not, so contributors running `uv run pytest` aren't bothered by
# the e2e tests' need for a live server.

[tool.coverage.run]
source = ["matrix"]
omit = [
    "matrix/test.py",
    "matrix/test_compaction.py",   # hand-driven LLM probe script (research/compaction.md)
    "matrix/*/test_*.py",
    # Embedding data types — exercised once the embedder adapters and their
    # tests land in a later sub-project.
    "matrix/model/embedding.py",
    # CLI entry point — only invoked via `python -m matrix.api`; needs
    # a live Postgres to run, so not covered by the unit suite.
    "matrix/api/__main__.py",
    # Typer CLI launcher — uvicorn invocation requires a live Postgres,
    # so the no-cover lines are the uvicorn.run() and main() shims.
    # The pure helpers (_load_config, _apply_logging) and the command
    # functions are exercised by tests/test_cli.py via a CliRunner with
    # uvicorn patched out.
    # Postgres scheduler — exercised by tests/scheduler/test_postgres.py
    # which gates on MATRIX_PG_TEST_DSN. Without a live Postgres the
    # tests skip and this file shows ~25% coverage; same treatment as
    # the matrix/storage/postgres.py family in CI-with-DSN runs.
    "matrix/scheduler/postgres.py",
    # FakeSandbox is a test seam (production-importable but only used by tests).
    "matrix/workspace/sandbox/fake.py",
    # ContainerRuntimeAdapter ABC has no concrete impls in Phase A.
    "matrix/workspace/runtime/adapter.py",
    # Runtime adapters need real Docker/Podman/containerd daemons;
    # gated contract tests cover them when env vars are set.
    "matrix/workspace/runtime/docker.py",
    "matrix/workspace/runtime/podman.py",
    "matrix/workspace/runtime/containerd/adapter.py",
    # K8s backend needs a real cluster; gated integration tests.
    "matrix/workspace/k8s/sandbox.py",
    "matrix/workspace/k8s/backend.py",
]

[tool.coverage.report]
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
# Per-module overrides — adapter modules ramp up to 90% as they land.
# Until matrix/llm/* and matrix/embedder/* contain code, the gate is
# effectively a no-op because there are no covered statements yet.
