# Local development stack for primer.
#
# Spins up Postgres + pgvector, plus the primer app itself (built from
# ./Dockerfile). Postgres data lives in the `primer-pgdata` named
# volume (inside the podman-machine VM, not on the Windows host) — a
# host bind-mount was tried but the postgres user can't chmod a
# Windows-mounted directory through podman.
#
# Container runtime: Podman (rootless or rootful, both work). The file
# is plain compose-spec so `docker compose` works against it too if
# you have Docker. The team uses Podman on Windows.
#
# Usage (Podman):
#   podman compose up -d              # start everything (builds primer on first run)
#   podman compose up -d --build      # rebuild the primer image and start
#   podman compose logs -f primer     # tail app logs
#   podman compose logs -f postgres   # tail database logs
#   podman compose down               # stop + remove containers; keeps volume
#   podman compose down -v            # also wipes the primer-pgdata volume
#
# AppConfig is driven entirely by environment variables here (the
# primer service reads PRIMER_* env, no config.yaml needed). To
# override defaults, create a .env file next to this compose file.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: primer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PRIMER_DB_USER:-primer}
      POSTGRES_PASSWORD: ${PRIMER_DB_PASSWORD:-primer}
      POSTGRES_DB: ${PRIMER_DB_DATABASE:-primer}
    ports:
      - "${PRIMER_DB_PORT:-5432}:5432"
    volumes:
      # Named volume — lives inside the podman-machine VM's filesystem.
      # A host bind-mount (./.data/postgres) was attempted first but
      # fails on podman-on-Windows because the postgres user (UID 999)
      # inside the container can't chmod the bind-mounted directory
      # (Windows filesystems don't map POSIX permissions to container
      # UIDs). Data still persists across container restarts; just not
      # browsable from Windows Explorer.
      - primer-pgdata:/var/lib/postgresql/data
      # Idempotent CREATE EXTENSION runs on first boot — needed by the
      # vector store registry and the internal collections subsystem.
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRIMER_DB_USER:-primer} -d ${PRIMER_DB_DATABASE:-primer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  primer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: primer-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database: connect by compose-network DNS, NOT localhost.
      # AppConfig after the §1 SQLite refactor expects nested db.*
      # via env_nested_delimiter="__"; the legacy flat PRIMER_DB_HOST
      # etc. keys are silently ignored. Without this, storage defaults
      # to embedded SQLite at ~/.primer/db/data.sqlite and the
      # PostgresScheduler crashes on .pool attribute access.
      PRIMER_DB__PROVIDER: postgres
      PRIMER_DB__CONFIG__HOSTNAME: postgres
      PRIMER_DB__CONFIG__PORT: 5432
      PRIMER_DB__CONFIG__DATABASE: ${PRIMER_DB_DATABASE:-primer}
      PRIMER_DB__CONFIG__USERNAME: ${PRIMER_DB_USER:-primer}
      PRIMER_DB__CONFIG__PASSWORD: ${PRIMER_DB_PASSWORD:-primer}
      # Scheduler: in-process Postgres (default for production).
      PRIMER_SCHEDULER__PROVIDER: postgres
      # Bind to all interfaces inside the container so the host port
      # mapping can reach the server.
      PRIMER_HOST: 0.0.0.0
      PRIMER_PORT: 8765
    ports:
      - "${PRIMER_PORT:-8765}:8765"
    volumes:
      # Live-mount ui/ so JSX/CSS edits are picked up by Babel-in-browser
      # without rebuilding the image. The FastAPI static mount serves
      # these at request time. RW (rather than :ro) so the nested
      # brand/ bind mount below can create its mountpoint at container
      # init under Docker's bind-recursive semantics; the container
      # process never writes to /app/ui in practice.
      - ./ui:/app/ui
      # Brand kit — mounted under ui/brand so the existing /console
      # static mount serves it at /console/brand/* without any
      # backend changes. Updates to brand/ on the host are picked up
      # immediately.
      - ./brand:/app/ui/brand:ro

volumes:
  primer-pgdata:
    name: primer-pgdata
